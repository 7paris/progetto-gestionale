<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Gestione utenti</title>
    <style>
      body {
        background: #000;
        color: #3399ff;
        font-family: "Courier New";
        text-align: center;
      }
      table {
        margin: 30px auto;
        border-collapse: collapse;
        width: 60%;
      }
      th,
      td {
        border: 1px solid #3399ff;
        padding: 10px;
      }
      a,
      button {
        color: #000;
        background: #3399ff;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
      }
      a:hover,
      button:hover {
        background: #66b3ff;
      }
      form {
        margin-top: 20px;
      }
      input {
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #3399ff;
        background: #000;
        color: #3399ff;
      }
    </style>
  </head>
  <body>
    <h2>Gestione Utenti</h2>

    <table>
      <tr>
        <th>Username</th>
        <th>Ruolo</th>
      </tr>
      {% for u in users %}
      <tr>
        <td>{{ u[0] }}</td>
        <td>{% if u[1] == 1 %}Admin{% else %}Utente{% endif %}</td>
      </tr>
      {% endfor %}
    </table>

    <h3>+ Nuovo utente</h3>
    <form method="post" action="{{ url_for('create_user') }}">
      <input type="text" name="username" placeholder="Nome utente" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Crea</button>
    </form>

    <br />
    <a href="{{ url_for('index') }}">⬅ Torna al gestionale</a>
  </body>
</html>
