<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Gestionale</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #3399ff;
        font-family: "Courier New", monospace;
      }
      .navbar {
        height: 50px;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        box-shadow: 0 2px 5px rgba(51, 153, 255, 0.5);
      }
      .navbar h1 {
        margin: 0;
      }
      .navbar a {
        color: #3399ff;
        text-decoration: none;
        font-weight: bold;
        cursor: pointer;
      }
      .container {
        padding: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
      }
      .folder {
        padding: 5px 10px;
        border: 1px solid #1a1a1a;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(51, 153, 255, 0.2);
        min-width: 80px;
        min-height: 30px;
        text-align: center;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }
      .folder:hover {
        box-shadow: 0 5px 15px rgba(51, 153, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <h1>Gestionale</h1>
      <div>
        {% if admin %}
        <a href="{{ url_for('manage_users') }}">Gestione utenti</a>
        &nbsp;|&nbsp; {% endif %}
        <a href="{{ url_for('logout') }}">Logout</a>
      </div>
    </div>

    <div class="container" id="container">
      {% for folder in folders %}
      <div class="folder" data-folder="{{ folder }}">{{ folder }}</div>
      {% endfor %}
    </div>

    <script>
      const container = document.getElementById("container");

      // Doppio click entra nella cartella
      container.addEventListener("dblclick", (e) => {
        if (e.target.classList.contains("folder")) {
          window.location.href = `/folder/${encodeURIComponent(
            e.target.dataset.folder
          )}`;
        }
      });
    </script>
  </body>
</html>
